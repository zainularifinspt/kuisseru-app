<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EduPulse - Quiz Editor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400..700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "deep-obsidian": "#0A0A0A",
                        "secondary-fixed-dim": "#d0bcff",
                        "secondary-fixed": "#e9ddff",
                        "on-error": "#ffffff",
                        "on-secondary-fixed-variant": "#5516be",
                        "tertiary-fixed": "#c3f400",
                        "surface-container": "#ededfb",
                        "mesh-pink": "#FF00E5",
                        "surface-dim": "#d9d9e7",
                        "inverse-surface": "#2e303a",
                        "surface-variant": "#e1e1ef",
                        "inverse-primary": "#b7c4ff",
                        "on-secondary-container": "#fffbff",
                        "on-tertiary-fixed-variant": "#3c4d00",
                        "on-tertiary-fixed": "#161e00",
                        "cyber-lime": "#CCFF00",
                        "surface-container-highest": "#e1e1ef",
                        "tertiary-fixed-dim": "#abd600",
                        "outline": "#737688",
                        "surface": "#fbf8ff",
                        "soft-violet": "#8B5CF6",
                        "primary-fixed": "#dde1ff",
                        "surface-bright": "#fbf8ff",
                        "secondary-container": "#8455ef",
                        "primary-container": "#0052ff",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#23005c",
                        "on-secondary": "#ffffff",
                        "electric-blue": "#0052FF",
                        "on-primary": "#ffffff",
                        "on-surface-variant": "#434656",
                        "on-error-container": "#93000a",
                        "inverse-on-surface": "#f0effe",
                        "primary-fixed-dim": "#b7c4ff",
                        "outline-variant": "#c3c5d9",
                        "error": "#ba1a1a",
                        "surface-container-high": "#e7e7f5",
                        "tertiary": "#425400",
                        "secondary": "#6b38d4",
                        "on-surface": "#191b25",
                        "surface-tint": "#004ced",
                        "on-tertiary-container": "#c5f600",
                        "on-primary-fixed-variant": "#0038b6",
                        "surface-container-low": "#f3f2ff",
                        "background": "#fbf8ff",
                        "primary": "#003ec7",
                        "on-primary-fixed": "#001452",
                        "on-tertiary": "#ffffff",
                        "on-primary-container": "#dfe3ff",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#576e00",
                        "on-background": "#191b25"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "gutter": "24px",
                        "container-max": "1200px",
                        "unit": "8px",
                        "margin-desktop": "40px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Space Grotesk"],
                        "quiz-option": ["Space Grotesk"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-bold": ["Space Grotesk"],
                        "headline-lg-mobile": ["Space Grotesk"],
                        "headline-md": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "headline-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "quiz-option": ["20px", { "lineHeight": "1.4", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "label-bold": ["14px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-lg-mobile": ["32px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "headline-md": ["32px", { "lineHeight": "1.2", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .mesh-gradient-bg {
            background-color: #fbf8ff;
            background-image: 
                radial-gradient(at 40% 20%, hsla(28,100%,74%,0.15) 0px, transparent 50%),
                radial-gradient(at 80% 0%, hsla(189,100%,56%,0.15) 0px, transparent 50%),
                radial-gradient(at 0% 50%, hsla(355,100%,93%,0.15) 0px, transparent 50%);
        }
        .bauhaus-border {
            border: 2px solid #0A0A0A;
        }
        .bauhaus-border-thick {
            border: 4px solid #0A0A0A;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md overflow-x-hidden min-h-screen mesh-gradient-bg">
<!-- SideNavBar -->
<nav class="h-screen w-64 fixed left-0 top-0 border-r-2 border-deep-obsidian bg-deep-obsidian dark:bg-deep-obsidian flex flex-col h-full py-8 px-4 z-50">
<div class="flex items-center gap-4 mb-12 px-2">
<div class="w-10 h-10 rounded-full bg-cyber-lime flex items-center justify-center bauhaus-border">
<span class="material-symbols-outlined text-deep-obsidian">school</span>
</div>
<div>
<h1 class="font-headline-md text-headline-md font-bold text-cyber-lime leading-tight">EduPulse</h1>
<p class="font-label-bold text-label-bold text-surface-variant/70">Admin Console</p>
</div>
</div>
<ul class="flex flex-col gap-2">
<li>
<a class="flex items-center gap-3 px-4 py-3 rounded-DEFAULT text-surface-variant/70 font-medium hover:text-surface-variant hover:bg-white/5 transition-colors duration-200" href="#">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-label-bold text-label-bold">Dashboard</span>
</a>
</li>
<li>
<!-- ACTIVE NAV -->
<a class="flex items-center gap-3 px-4 py-3 rounded-DEFAULT text-cyber-lime font-bold border-l-4 border-cyber-lime bg-white/10 scale-105 transition-transform duration-200" href="#">
<span class="material-symbols-outlined">quiz</span>
<span class="font-label-bold text-label-bold">Quizzes</span>
</a>
</li>
<li>
<a class="flex items-center gap-3 px-4 py-3 rounded-DEFAULT text-surface-variant/70 font-medium hover:text-surface-variant hover:bg-white/5 transition-colors duration-200" href="#">
<span class="material-symbols-outlined">group</span>
<span class="font-label-bold text-label-bold">Users</span>
</a>
</li>
<li>
<a class="flex items-center gap-3 px-4 py-3 rounded-DEFAULT text-surface-variant/70 font-medium hover:text-surface-variant hover:bg-white/5 transition-colors duration-200" href="#">
<span class="material-symbols-outlined">assessment</span>
<span class="font-label-bold text-label-bold">Reports</span>
</a>
</li>
<li>
<a class="flex items-center gap-3 px-4 py-3 rounded-DEFAULT text-surface-variant/70 font-medium hover:text-surface-variant hover:bg-white/5 transition-colors duration-200 mt-8" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="font-label-bold text-label-bold">Settings</span>
</a>
</li>
</ul>
</nav>
<!-- Main Content Area -->
<div class="ml-64 flex flex-col min-h-screen">
<!-- TopNavBar -->
<header class="docked full-width top-0 sticky border-b-2 border-deep-obsidian backdrop-blur-md bg-surface/80 dark:bg-deep-obsidian/80 flex justify-between items-center px-8 h-20 w-full z-40">
<h2 class="font-headline-md text-headline-md text-deep-obsidian dark:text-surface font-bold tracking-tight">EduPulse Dashboard</h2>
<div class="flex items-center gap-6">
<div class="flex items-center gap-4 text-electric-blue dark:text-electric-blue">
<button class="hover:text-electric-blue transition-colors w-10 h-10 rounded-full hover:bg-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="hover:text-electric-blue transition-colors w-10 h-10 rounded-full hover:bg-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined">help</span>
</button>
</div>
<div class="w-10 h-10 rounded-full bauhaus-border overflow-hidden">
<img alt="Administrator Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDyS1z2hXA8Hb5XMPxB6QjYSuXqLJDecdbqyOz3SeAt_4l9suJjPChdY8LYi1dGrZsLsO5lc76qyTWYCpNYGpiqSvbp9BjXO53BXBcRUYf19MY07Q9SirQtcgCuBTQqaq10U9EEFX-m8SyNo-PSmEJeLnwEu5shuL1K8s-XPYBo0CMzsuphR9gi4pm1r-oZBSXqtwxxVosRxcygJ0wklsWY36CpwmV3dPbb0acP-vWeiabYocoUo3o"/>
</div>
</div>
</header>
<!-- Quiz Editor Canvas -->
<main class="flex-1 p-8">
<div class="max-w-7xl mx-auto grid grid-cols-12 gap-8">
<!-- Left Sidebar: Question List -->
<aside class="col-span-3 flex flex-col gap-4">
<div class="glass-panel p-6 rounded-xl bauhaus-border sticky top-28">
<div class="flex justify-between items-center mb-6">
<h3 class="font-headline-md text-2xl font-bold text-deep-obsidian">Questions</h3>
<span class="bg-deep-obsidian text-cyber-lime font-label-bold text-xs px-3 py-1 rounded-full">5 Total</span>
</div>
<div class="flex flex-col gap-3 max-h-[60vh] overflow-y-auto pr-2">
<!-- Question Item Active -->
<div class="p-3 rounded-lg border-2 border-electric-blue bg-electric-blue/5 cursor-pointer flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-electric-blue text-white flex items-center justify-center font-label-bold text-sm">1</div>
<span class="font-body-md text-sm truncate flex-1">Introduction to Geometry</span>
</div>
<!-- Question Item -->
<div class="p-3 rounded-lg border-2 border-surface-variant hover:border-deep-obsidian cursor-pointer flex items-center gap-3 transition-colors">
<div class="w-8 h-8 rounded-full bg-surface-variant text-deep-obsidian flex items-center justify-center font-label-bold text-sm">2</div>
<span class="font-body-md text-sm truncate flex-1">Area of a Triangle</span>
</div>
<!-- Question Item -->
<div class="p-3 rounded-lg border-2 border-surface-variant hover:border-deep-obsidian cursor-pointer flex items-center gap-3 transition-colors">
<div class="w-8 h-8 rounded-full bg-surface-variant text-deep-obsidian flex items-center justify-center font-label-bold text-sm">3</div>
<span class="font-body-md text-sm truncate flex-1">Pythagorean Theorem</span>
</div>
</div>
<button class="mt-6 w-full py-3 rounded-full bg-deep-obsidian text-white font-label-bold flex items-center justify-center gap-2 hover:bg-electric-blue transition-colors duration-300">
<span class="material-symbols-outlined">add</span> Add Question
                        </button>
</div>
</aside>
<!-- Main Editor Area -->
<div class="col-span-9 flex flex-col gap-8">
<!-- Quiz Metadata Card -->
<div class="glass-panel p-8 rounded-2xl bauhaus-border">
<div class="flex flex-col gap-6">
<div>
<label class="font-label-bold text-deep-obsidian mb-2 block">Quiz Title</label>
<input class="w-full bg-white rounded-full border-2 border-deep-obsidian px-6 py-4 font-headline-md text-2xl focus:border-electric-blue focus:ring-0 focus:outline-none shadow-[4px_4px_0px_0px_rgba(10,10,10,1)] transition-all" type="text" value="Advanced Geometry Midterm"/>
</div>
<div class="flex gap-4">
<div class="flex-1">
<label class="font-label-bold text-deep-obsidian mb-2 block">Subject</label>
<select class="w-full bg-white rounded-full border-2 border-deep-obsidian px-6 py-3 font-body-md focus:border-electric-blue focus:ring-0 focus:outline-none appearance-none">
<option>Mathematics</option>
<option>Physics</option>
</select>
</div>
<div class="flex-1">
<label class="font-label-bold text-deep-obsidian mb-2 block">Time Limit (Mins)</label>
<input class="w-full bg-white rounded-full border-2 border-deep-obsidian px-6 py-3 font-body-md focus:border-electric-blue focus:ring-0 focus:outline-none" type="number" value="45"/>
</div>
</div>
</div>
</div>
<!-- Question Editor Card -->
<div class="glass-panel p-8 rounded-2xl bauhaus-border relative overflow-hidden">
<!-- Decorative gradient blob -->
<div class="absolute -right-20 -top-20 w-64 h-64 bg-electric-blue/10 rounded-full blur-3xl z-0"></div>
<div class="relative z-10 flex flex-col gap-8">
<div class="flex justify-between items-center">
<h3 class="font-headline-md text-2xl font-bold flex items-center gap-3">
<span class="w-10 h-10 rounded-full bg-electric-blue text-white flex items-center justify-center font-headline-md text-xl">1</span>
                                    Question Text
                                </h3>
<div class="flex gap-2">
<button class="w-10 h-10 rounded-full border-2 border-deep-obsidian flex items-center justify-center hover:bg-surface-variant transition-colors" title="Add Image">
<span class="material-symbols-outlined">image</span>
</button>
<button class="w-10 h-10 rounded-full border-2 border-deep-obsidian flex items-center justify-center hover:bg-error/10 hover:text-error hover:border-error transition-colors" title="Delete Question">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
</div>
<textarea class="w-full bg-white rounded-xl border-2 border-deep-obsidian p-6 font-body-md text-lg focus:border-electric-blue focus:ring-0 focus:outline-none resize-none font-mono" placeholder="Enter your question here... Supports LaTeX e.g. $$x^2 + y^2 = z^2$$" rows="4">Calculate the hypotenuse of a right triangle where side A is 3 and side B is 4. Use the formula $$c = \sqrt{a^2 + b^2}$$</textarea>
<div class="grid grid-cols-2 gap-6">
<!-- Option A -->
<div class="relative group">
<div class="absolute -inset-1 bg-electric-blue rounded-xl blur opacity-0 group-hover:opacity-20 transition duration-300"></div>
<div class="relative flex items-center bg-white rounded-xl border-2 border-deep-obsidian p-4 gap-4">
<div class="w-10 h-10 rounded-lg bg-deep-obsidian text-white flex items-center justify-center font-headline-md text-xl flex-shrink-0">A</div>
<input class="flex-1 border-none bg-transparent focus:ring-0 font-quiz-option p-0" type="text" value="7"/>
<button class="w-8 h-8 rounded-full border-2 border-surface-variant flex items-center justify-center hover:border-deep-obsidian transition-colors">
<span class="material-symbols-outlined text-sm">check</span>
</button>
</div>
</div>
<!-- Option B (Correct) -->
<div class="relative group">
<div class="absolute -inset-1 bg-cyber-lime rounded-xl blur opacity-30 transition duration-300"></div>
<div class="relative flex items-center bg-white rounded-xl border-4 border-deep-obsidian p-4 gap-4 shadow-[4px_4px_0px_0px_rgba(204,255,0,1)]">
<div class="w-10 h-10 rounded-lg bg-cyber-lime text-deep-obsidian flex items-center justify-center font-headline-md text-xl flex-shrink-0">B</div>
<input class="flex-1 border-none bg-transparent focus:ring-0 font-quiz-option p-0" type="text" value="5"/>
<button class="w-8 h-8 rounded-full bg-cyber-lime border-2 border-deep-obsidian flex items-center justify-center text-deep-obsidian">
<span class="material-symbols-outlined text-sm">check</span>
</button>
</div>
</div>
<!-- Option C -->
<div class="relative group">
<div class="absolute -inset-1 bg-electric-blue rounded-xl blur opacity-0 group-hover:opacity-20 transition duration-300"></div>
<div class="relative flex items-center bg-white rounded-xl border-2 border-deep-obsidian p-4 gap-4">
<div class="w-10 h-10 rounded-lg bg-deep-obsidian text-white flex items-center justify-center font-headline-md text-xl flex-shrink-0">C</div>
<input class="flex-1 border-none bg-transparent focus:ring-0 font-quiz-option p-0" type="text" value="25"/>
<button class="w-8 h-8 rounded-full border-2 border-surface-variant flex items-center justify-center hover:border-deep-obsidian transition-colors">
<span class="material-symbols-outlined text-sm">check</span>
</button>
</div>
</div>
<!-- Option D -->
<div class="relative group">
<div class="absolute -inset-1 bg-electric-blue rounded-xl blur opacity-0 group-hover:opacity-20 transition duration-300"></div>
<div class="relative flex items-center bg-white rounded-xl border-2 border-deep-obsidian p-4 gap-4">
<div class="w-10 h-10 rounded-lg bg-deep-obsidian text-white flex items-center justify-center font-headline-md text-xl flex-shrink-0">D</div>
<input class="flex-1 border-none bg-transparent focus:ring-0 font-quiz-option p-0" type="text" value="12"/>
<button class="w-8 h-8 rounded-full border-2 border-surface-variant flex items-center justify-center hover:border-deep-obsidian transition-colors">
<span class="material-symbols-outlined text-sm">check</span>
</button>
</div>
</div>
</div>
</div>
</div>
<!-- Action Bar -->
<div class="flex justify-end gap-4 mt-4 mb-12">
<button class="px-8 py-3 rounded-full border-2 border-deep-obsidian font-label-bold hover:bg-surface-variant transition-colors">Save Draft</button>
<button class="px-8 py-3 rounded-full bg-electric-blue text-white font-label-bold hover:scale-105 transition-transform duration-200 flex items-center gap-2 shadow-[4px_4px_0px_0px_rgba(10,10,10,1)] border-2 border-deep-obsidian">
<span class="material-symbols-outlined">publish</span> Publish Quiz
                        </button>
</div>
</div>
</div>
</main>
</div>
</body></html>
