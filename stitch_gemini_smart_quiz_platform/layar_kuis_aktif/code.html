<script>
        // Simple Timer Logic
        const TIME_LIMIT = 15;
        let timePassed = 0;
        let timeLeft = TIME_LIMIT;
        let timerInterval = null;
        const FULL_DASH_ARRAY = 283; // 2 * pi * r (approx for r=45)

        function formatTimeLeft(time) {
            return time;
        }

        function calculateTimeFraction() {
            const rawTimeFraction = timeLeft / TIME_LIMIT;
            return rawTimeFraction - (1 / TIME_LIMIT) * (1 - rawTimeFraction);
        }

        function setCircleDasharray() {
            const circleDasharray = `${(calculateTimeFraction() * FULL_DASH_ARRAY).toFixed(0)} 283`;
            document.getElementById("timerPath").setAttribute("stroke-dasharray", circleDasharray);
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timePassed = timePassed += 1;
                timeLeft = TIME_LIMIT - timePassed;
                
                document.getElementById("timerText").innerHTML = formatTimeLeft(timeLeft);
                setCircleDasharray();

                if (timeLeft <= 5) {
                    document.getElementById("timerPath").classList.remove("text-mesh-pink");
                    document.getElementById("timerPath").classList.add("text-error");
                    document.getElementById("timerText").classList.add("text-error", "animate-pulse");
                }

                if (timeLeft === 0) {
                    clearInterval(timerInterval);
                    // Handle time up
                }
            }, 1000);
        }

        // Selection Logic
        function selectOption(buttonElement) {
            // Remove selected class from all options
            const options = document.querySelectorAll('.quiz-option');
            options.forEach(opt => {
                opt.classList.remove('selected');
                opt.classList.remove('bg-electric-blue/10');
            });
            
            // Add selected styling to clicked option
            buttonElement.classList.add('selected');
            buttonElement.classList.add('bg-electric-blue/10');
            
            // Optional: Auto-submit after short delay
            // setTimeout(() => alert('Jawaban dikirim!'), 1000);
        }

        // Initialize
        startTimer();
    </script>
