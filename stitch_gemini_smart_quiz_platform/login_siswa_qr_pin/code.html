<style>

<body class="bg-background text-on-background min-h-screen relative overflow-hidden flex flex-col font-body-md">
<!-- Background Shapes -->
<div class="absolute inset-0 pointer-events-none z-0 overflow-hidden">

<!-- Main Content Canvas -->

<div class="text-center mb-8">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-deep-obsidian mb-2">

            </h1>
<h2 class="font-headline-md text-headline-md text-electric-blue">
                Siap Beraksi?
            </h2>
</div>
<!-- Scanner Area -->
<div class="w-full aspect-square max-w-sm relative bg-surface-container-low rounded-[2rem] border-4 border-deep-obsidian p-4 mb-8 shadow-[0_0_40px_rgba(0,82,255,0.1)] overflow-hidden">
<div class="absolute inset-0 m-8 border-4 border-dashed border-outline-variant rounded-xl opacity-50"></div>
<!-- Scanning Animation -->
<div class="absolute left-8 right-8 h-1 bg-cyber-lime rounded-full scanner-line shadow-[0_0_15px_#CCFF00] z-20"></div>
<!-- Placeholder for camera view -->
<div class="w-full h-full rounded-xl bg-surface-container-highest flex items-center justify-center relative overflow-hidden">
<span class="material-symbols-outlined text-outline text-6xl opacity-30" style="font-variation-settings: 'FILL' 1;">
                    qr_code_scanner
                </span>
<!-- Decorative scan targets -->
<div class="absolute top-4 left-4 w-6 h-6 border-t-4 border-l-4 border-electric-blue rounded-tl-lg"></div>
<div class="absolute top-4 right-4 w-6 h-6 border-t-4 border-r-4 border-electric-blue rounded-tr-lg"></div>
<div class="absolute bottom-4 left-4 w-6 h-6 border-b-4 border-l-4 border-electric-blue rounded-bl-lg"></div>

</div>
<div class="absolute bottom-4 left-0 right-0 text-center">

</div>

ama Kamu</label>
<input class="w-full bg-surface-container-lowest border-2 border-deep-obsidian rounded-full px-6 py-4 font-headline-md text-quiz-option text-on-surface placeholder:text-outline focus:outline-none focus:border-electric-blue focus:ring-4 focus:ring-primary-fixed transition-all duration-300" id="nickname" placeholder="Nama Panggilan / Nickname" type="text"/>
<span class="material-symbols-outlined absolute right-6 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-electric-blue transition-colors">

<div class="absolute inset-0 mesh-gradient-btn opacity-80 group-hover:opacity-100 transition-opacity"></div>
<div class="relative bg-transparent px-8 py-4 rounded-full flex items-center justify-center gap-2">
<span class="font-headline-md text-quiz-option text-on-primary font-bold tracking-wide shadow-sm">

<span class="material-symbols-outlined text-on-primary" style="font-variation-settings: 'FILL' 1;">
                        rocket_launch
                    </span>
</div>
</button>

<script>
        // Simple input focus enhancement script
        document.getElementById('nickname').addEventListener('focus', function() {
            this.parentElement.classList.add('shadow-[0_0_15px_rgba(0,82,255,0.2)]');
        });
        document.getElementById('nickname').addEventListener('blur', function() {
            this.parentElement.classList.remove('shadow-[0_0_15px_rgba(0,82,255,0.2)]');
        });
    </script>
